# Codegen for the whole project (spec §10). Regenerate with `easyp generate`.
deps:
  - github.com/bufbuild/protoc-gen-validate@v1.3.3
generate:
  inputs:
    - directory: protocols
    - git_repo:
        url: github.com/bufbuild/protoc-gen-validate
        sub_directory: validate
  plugins:
    - name: prost
      out: crates/slozhn-proto/src
      opts:
        bytes: "."
        file_descriptor_set: true
    - name: tonic
      out: crates/slozhn-proto/src
      opts:
        no_transport: "true"
    - name: prost-crate
      out: crates/slozhn-proto
      opts:
        include_file: src/lib.rs
        gen_crate: protocols/assets/Cargo.toml.tmpl
