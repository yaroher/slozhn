# cargo-deny configuration: supply-chain checks run in CI (see
# .github/workflows/ci.yml, job `supply-chain`).
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "0BSD",
]
confidence-threshold = 0.8

[licenses.private]
# examples/*, slozhn-grpc-tests, etc. are workspace-internal (publish = false)
# and carry no license field — they aren't distributed, so skip them.
ignore = true

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
