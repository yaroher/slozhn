name: release

# Triggered by pushing a vX.Y.Z tag (see `make release`). Re-runs the full CI
# suite, creates a GitHub release with generated notes, and publishes the
# workspace crates to crates.io (and npm workspaces, once they exist).
#
# Required repository secrets:
#   CARGO_REGISTRY_TOKEN — crates.io API token (publish scope)
#   NPM_TOKEN            — npmjs.com automation token (only once packages/ exists)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Releases must build green: reuse the full CI suite.
  ci:
    uses: ./.github/workflows/ci.yml

  create-release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"

  crates:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: make publish-crates

  npm:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No npm packages yet: the steps below arm themselves automatically
      # once packages/*/package.json appears (e.g. @slozhn/protoc-gen-slozhn-es).
      # (hashFiles is unavailable in job-level `if` — no workspace there.)
      - name: Detect npm workspaces
        id: detect
        run: |
          if compgen -G "packages/*/package.json" > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "no npm workspaces — skipping publish"
          fi
      - uses: actions/setup-node@v6
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install
        if: steps.detect.outputs.present == 'true'
        run: npm ci
      - name: Build workspaces
        if: steps.detect.outputs.present == 'true'
        run: npm run --workspaces build
      - name: Publish workspaces to npm
        if: steps.detect.outputs.present == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspaces --access public
